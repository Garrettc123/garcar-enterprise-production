services:
  - type: web
    name: garcar-platform
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: BASE_URL
        value: https://garcar-platform.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://garcar-platform.onrender.com,https://www.perplexity.ai
