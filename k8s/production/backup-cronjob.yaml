apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup-sa
  namespace: garcar-prod
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: database-backup
  namespace: garcar-prod
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: backup-sa
          restartPolicy: Never
          containers:
          - name: backup
            # postgres:15-alpine already ships with pg_dump; install awscli on top.
            image: postgres:15-alpine
            command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "📦 Installing AWS CLI..."
              apk add --no-cache aws-cli

              TIMESTAMP=$(date +%Y%m%d_%H%M%S)
              DUMP_FILE="backup_${TIMESTAMP}.dump"

              echo "🗄️ Dumping database..."
              PGPASSWORD="$DB_PASSWORD" pg_dump \
                -h "$DB_HOST" \
                -U postgres \
                -d revenue_aggregator \
                -F c \
                -f "/tmp/${DUMP_FILE}"

              echo "📤 Uploading to S3..."
              aws s3 cp "/tmp/${DUMP_FILE}" \
                "s3://garcar-backups/database/${DUMP_FILE}" \
                --storage-class GLACIER

              echo "🧹 Cleaning backups older than 30 days..."
              CUTOFF_EPOCH=$(date -d '30 days ago' +%s)
              aws s3api list-objects-v2 \
                --bucket garcar-backups \
                --prefix database/ \
                --query 'Contents[].{Key: Key, LastModified: LastModified}' \
                --output text | \
              while read -r key last_modified; do
                OBJ_EPOCH=$(date -d "$last_modified" +%s 2>/dev/null || echo 0)
                if [ "$OBJ_EPOCH" -lt "$CUTOFF_EPOCH" ] && [ -n "$key" ]; then
                  aws s3 rm "s3://garcar-backups/$key"
                  echo "🗑️  Removed: $key"
                fi
              done

              rm -f "/tmp/${DUMP_FILE}"
              echo "✅ Backup complete: s3://garcar-backups/database/${DUMP_FILE}"
            env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: garcar-config
                  key: DB_HOST
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: garcar-secrets
                  key: DB_PASSWORD
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: garcar-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: garcar-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
            resources:
              requests:
                memory: "256Mi"
                cpu: "200m"
              limits:
                memory: "512Mi"
                cpu: "500m"
