name: API Health Monitor

on:
  schedule:
    - cron: '23 8 * * *'  # Once daily at 8:23 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    name: Ping GARCAR API

    steps:
      - name: Check API_URL secret
        id: check
        run: |
          if [ -z "$API_URL" ]; then
            echo "::notice::API_URL secret is not set — skipping health check."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          API_URL: ${{ secrets.API_URL }}

      - name: Health check
        if: steps.check.outputs.skip != 'true'
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/health" || echo "000")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "API healthy"
          else
            echo "::warning::API returned HTTP $STATUS — may still be warming up"
            exit 1
          fi
        env:
          API_URL: ${{ secrets.API_URL }}

      - name: Skip notice
        if: steps.check.outputs.skip == 'true'
        run: |
          echo "Health check skipped — API_URL secret not configured."
          echo "To enable: add API_URL to repo secrets at:"
          echo "https://github.com/Garrettc123/garcar-enterprise-production/settings/secrets/actions"
          exit 0
