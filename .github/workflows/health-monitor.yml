name: API Health Monitor

on:
  schedule:
    - cron: '23 8 * * *' # Once daily at 8:23 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    name: Ping GARCAR API

    steps:
      - name: Check API_URL secret
        id: check
        run: |
          if [ -z "$API_URL" ]; then
            echo "::notice::API_URL secret is not set — skipping health check."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          API_URL: ${{ secrets.API_URL }}

      - name: Health check (with retries)
        if: steps.check.outputs.skip != 'true'
        run: |
          MAX_RETRIES=3
          RETRY_DELAY=15
          attempt=1
          while [ $attempt -le $MAX_RETRIES ]; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$API_URL/health" || echo "000")
            echo "Attempt $attempt — HTTP Status: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "API healthy"
              exit 0
            fi
            echo "::warning::Attempt $attempt — API returned HTTP $STATUS"
            if [ $attempt -lt $MAX_RETRIES ]; then
              echo "Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
            attempt=$((attempt + 1))
          done
          echo "::warning::API did not return 200 after $MAX_RETRIES attempts — service may be sleeping or redeploying."
          exit 0
        env:
          API_URL: ${{ secrets.API_URL }}
