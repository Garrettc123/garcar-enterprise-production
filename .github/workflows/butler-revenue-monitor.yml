name: Butler Revenue Monitor
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check endpoints
        run: |
          for url in ${{ secrets.PRODUCT_URLS }}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            if [ "$code" != "200" ]; then
              curl -s -X POST "${{ secrets.BUTLER_WEBHOOK_URL }}"                 -H "Content-Type: application/json"                 -d "{"alert":"down","url":"$url","status":"$code"}"
            fi
          done
      - name: Revenue pulse
        run: |
          curl -s -X POST "${{ secrets.BUTLER_WEBHOOK_URL }}"             -H "Content-Type: application/json"             -d "{"task":"revenue_sync","ts":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"}"
