name: 🔐 Bootstrap Secrets
on:
  workflow_dispatch:
    inputs:
      DB_HOST:
        description: 'PostgreSQL host (RDS endpoint or IP)'
        required: true
      DB_PASSWORD:
        description: 'PostgreSQL password'
        required: true
      REDIS_PASSWORD:
        description: 'Redis password'
        required: false
        default: ''
      JWT_SECRET:
        description: 'JWT signing secret (min 32 chars)'
        required: true
      AWS_ACCESS_KEY_ID:
        description: 'AWS IAM Access Key ID'
        required: true
      AWS_SECRET_ACCESS_KEY:
        description: 'AWS IAM Secret Access Key'
        required: true
      STRIPE_SECRET_KEY:
        description: 'Stripe secret key (sk_live_... or sk_test_...)'
        required: true
      STRIPE_WEBHOOK_SECRET:
        description: 'Stripe webhook signing secret (whsec_...)'
        required: true
      GARCAR_API_KEY:
        description: 'Internal Garcar API key for agent orchestration'
        required: false
        default: ''
      GRAFANA_PASSWORD:
        description: 'Grafana admin password'
        required: false
        default: 'admin'
      SLACK_WEBHOOK_URL:
        description: 'Slack webhook URL (optional)'
        required: false
        default: ''
      PAGERDUTY_WEBHOOK:
        description: 'PagerDuty events URL (optional)'
        required: false
        default: ''
      PAGERDUTY_KEY:
        description: 'PagerDuty integration key (optional)'
        required: false
        default: ''

jobs:
  bootstrap:
    name: 🔐 Set All Secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 🛡️ Validate PAT Token
        run: |
          if [ -z "${{ secrets.BOOTSTRAP_PAT }}" ]; then
            echo "❌ BOOTSTRAP_PAT secret is not set."
            echo ""
            echo "You need to add ONE secret manually first:"
            echo "  1. Go to: https://github.com/settings/tokens/new"
            echo "  2. Name: garcar-bootstrap"
            echo "  3. Expiration: 7 days"
            echo "  4. Scopes: Check 'repo' (full)"
            echo "  5. Click Generate token, copy it"
            echo "  6. Go to: https://github.com/Garrettc123/garcar-enterprise-production/settings/secrets/actions/new"
            echo "  7. Name: BOOTSTRAP_PAT  Value: (paste token)"
            echo "  8. Re-run this workflow"
            exit 1
          fi
          echo "✅ BOOTSTRAP_PAT is present"

      - name: 📥 Install GitHub CLI
        run: |
          type -p curl >/dev/null || apt-get install curl -y
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | \
            dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] \
            https://cli.github.com/packages stable main" | \
            tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          apt-get update -qq
          apt-get install gh -y -qq
          gh --version

      - name: 🔐 Set All Secrets
        env:
          GH_TOKEN: ${{ secrets.BOOTSTRAP_PAT }}
          REPO: Garrettc123/garcar-enterprise-production
        run: |
          set_secret() {
            local NAME="$1"
            local VALUE="$2"
            if [ -z "$VALUE" ]; then
              echo "⏭️  Skipped $NAME (empty)"
              return
            fi
            if echo -n "$VALUE" | gh secret set "$NAME" --repo "$REPO"; then
              echo "✅ Set $NAME"
            else
              echo "❌ Failed: $NAME"
            fi
          }

          echo "=== Setting Required Secrets ==="
          set_secret "DB_HOST"               "${{ github.event.inputs.DB_HOST }}"
          set_secret "DB_PASSWORD"           "${{ github.event.inputs.DB_PASSWORD }}"
          set_secret "JWT_SECRET"            "${{ github.event.inputs.JWT_SECRET }}"
          set_secret "AWS_ACCESS_KEY_ID"     "${{ github.event.inputs.AWS_ACCESS_KEY_ID }}"
          set_secret "AWS_SECRET_ACCESS_KEY" "${{ github.event.inputs.AWS_SECRET_ACCESS_KEY }}"
          set_secret "STRIPE_SECRET_KEY"     "${{ github.event.inputs.STRIPE_SECRET_KEY }}"
          set_secret "STRIPE_WEBHOOK_SECRET" "${{ github.event.inputs.STRIPE_WEBHOOK_SECRET }}"

          echo ""
          echo "=== Setting Optional Secrets ==="
          set_secret "REDIS_PASSWORD"    "${{ github.event.inputs.REDIS_PASSWORD }}"
          set_secret "GARCAR_API_KEY"    "${{ github.event.inputs.GARCAR_API_KEY }}"
          set_secret "GRAFANA_PASSWORD"  "${{ github.event.inputs.GRAFANA_PASSWORD }}"
          set_secret "SLACK_WEBHOOK_URL" "${{ github.event.inputs.SLACK_WEBHOOK_URL }}"
          set_secret "PAGERDUTY_WEBHOOK" "${{ github.event.inputs.PAGERDUTY_WEBHOOK }}"
          set_secret "PAGERDUTY_KEY"     "${{ github.event.inputs.PAGERDUTY_KEY }}"

      - name: ✅ Verify Secrets Were Set
        env:
          GH_TOKEN: ${{ secrets.BOOTSTRAP_PAT }}
        run: |
          echo "=== Secrets Now Registered ==="
          gh secret list --repo Garrettc123/garcar-enterprise-production

      - name: 🧹 Security Reminder
        run: |
          echo ""
          echo "🔒 SECURITY: Delete BOOTSTRAP_PAT after this run."
          echo "   Go to: https://github.com/settings/tokens"
          echo "   Revoke: garcar-bootstrap token"
          echo ""
          echo "   Also delete the BOOTSTRAP_PAT secret:"
          echo "   https://github.com/Garrettc123/garcar-enterprise-production/settings/secrets/actions"
