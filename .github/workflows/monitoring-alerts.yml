name: 📊 Monitoring & Alerts
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    name: 🏥 System Health Check
    runs-on: ubuntu-latest

    steps:
      - name: 🔍 Check Revenue Aggregator
        id: check_revenue
        continue-on-error: true
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://api.garcar-enterprise.com/revenue/health)
          echo "revenue_status=$RESPONSE" >> $GITHUB_OUTPUT
          echo "Revenue Aggregator HTTP: $RESPONSE"

      - name: 🤖 Check AI Agent Hub
        id: check_agents
        continue-on-error: true
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://api.garcar-enterprise.com/agents/status)
          echo "agents_status=$RESPONSE" >> $GITHUB_OUTPUT
          echo "AI Agent Hub HTTP: $RESPONSE"

      - name: 🌐 Check API Gateway
        id: check_gateway
        continue-on-error: true
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://api.garcar-enterprise.com/health)
          echo "gateway_status=$RESPONSE" >> $GITHUB_OUTPUT
          echo "API Gateway HTTP: $RESPONSE"

      - name: 📈 Check Prometheus Metrics
        continue-on-error: true
        run: |
          METRICS=$(curl -s --max-time 10 "https://prometheus.garcar-enterprise.com/api/v1/query?query=up")
          echo "Metrics: $METRICS"

      - name: 📊 Report Health Status
        run: |
          echo "=== Garcar Enterprise Health Report ==="
          echo "Revenue Aggregator: ${{ steps.check_revenue.outputs.revenue_status || 'unreachable' }}"
          echo "AI Agent Hub:       ${{ steps.check_agents.outputs.agents_status || 'unreachable' }}"
          echo "API Gateway:        ${{ steps.check_gateway.outputs.gateway_status || 'unreachable' }}"

      - name: 🚨 Alert on Failure
        if: |
          failure() &&
          secrets.PAGERDUTY_WEBHOOK != '' &&
          secrets.PAGERDUTY_KEY != ''
        run: |
          curl -X POST "${{ secrets.PAGERDUTY_WEBHOOK }}" \
            -H 'Content-Type: application/json' \
            -d '{
              "routing_key": "${{ secrets.PAGERDUTY_KEY }}",
              "event_action": "trigger",
              "payload": {
                "summary": "Garcar Enterprise Health Check Failed",
                "severity": "critical",
                "source": "github-actions",
                "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
              }
            }'
